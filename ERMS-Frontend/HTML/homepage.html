<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center – Discover Amazing Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:   #F5A623;
      --orange-dark: #E09315;
      --green:    #28C76F;
      --red:      #EA5455;
      --text:     #2D2D2D;
      --muted:    #6E6E6E;
      --light:    #F8F8F8;
      --white:    #FFFFFF;
      --shadow:   0 4px 18px rgba(0,0,0,0.10);
      --radius:   12px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--white);
      color: var(--text);
    }

    /* ─── NAV ─────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 40px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 1.7rem;
      color: var(--orange);
      line-height: 1.1;
    }
    .logo span { display: block; }

    .nav-btns { display: flex; gap: 10px; }

    .btn-nav {
      padding: 7px 22px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
    }
    .btn-nav.active {
      background: var(--orange);
      color: #fff;
      border: 2px solid var(--orange);
    }
    .btn-nav.outline {
      background: transparent;
      color: var(--text);
      border: 2px solid #ddd;
    }
    .btn-nav.outline:hover { border-color: var(--orange); color: var(--orange); }
    .btn-nav.active:hover  { background: var(--orange-dark); }

    .btn-nav.logout {
      display: flex; align-items: center; gap: 6px;
    }
    .btn-nav.logout svg { width:15px; height:15px; }

    /* ─── HERO ────────────────────────────────── */
    .hero {
      margin-top: 58px;
      position: relative;
      height: 320px;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
        url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1400&q=80') center/cover no-repeat;
    }
    .hero-content { position: relative; z-index: 1; padding: 0 20px; }
    .hero-content h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 10px;
    }
    .hero-content p {
      font-size: 1rem;
      color: rgba(255,255,255,.85);
      margin-bottom: 24px;
    }
    .search-wrap {
      display: flex; align-items: center;
      background: #fff;
      border-radius: 50px;
      padding: 10px 20px;
      width: 500px; max-width: 90vw;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .search-wrap input {
      flex: 1;
      border: none; outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      background: transparent;
    }
    .search-wrap input::placeholder { color: #aaa; }
    .search-wrap button {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center;
    }
    .search-wrap button svg { width:20px; height:20px; color: var(--muted); }

    /* ─── STATS ───────────────────────────────── */
    .stats {
      display: flex; justify-content: center; gap: 80px;
      padding: 42px 40px;
      background: #fff;
    }
    .stat {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .stat-icon {
      width: 52px; height: 52px;
      background: #FFF5E5;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .stat-icon svg { width:28px; height:28px; color: var(--orange); fill: var(--orange); }
    .stat-num {
      font-size: 1.8rem; font-weight: 800; color: var(--text);
    }
    .stat-label {
      font-size: 0.82rem; color: var(--muted); font-weight: 600;
    }

    /* ─── FILTER ──────────────────────────────── */
    .filter-section {
      padding: 10px 40px 0;
    }
    .filter-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .filter-header svg { width:22px; height:22px; color: var(--text); }
    .filter-header span {
      font-size: 1.05rem; font-weight: 700; color: var(--text);
    }
    .filter-pills {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .pill {
      padding: 7px 22px;
      border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid #E0E0E0;
      background: #fff;
      color: var(--text);
      transition: all .2s;
    }
    .pill:hover   { border-color: var(--orange); color: var(--orange); }
    .pill.active  { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* ─── EVENTS GRID ─────────────────────────── */
    .events-section { padding: 30px 40px 60px; }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    /* ─── EVENT CARD ──────────────────────────── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0,0,0,.14);
    }
    .card-img {
      position: relative;
      height: 150px;
      overflow: hidden;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s;
    }
    .card:hover .card-img img { transform: scale(1.05); }

    .badge {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: .4px;
    }
    .badge.available { background: var(--green);  color: #fff; }
    .badge.full      { background: var(--red);    color: #fff; }

    .card-body { padding: 14px 16px 16px; }

    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 5px;
    }
    .card-cat {
      font-size: 0.75rem; font-weight: 700;
      color: var(--orange);
    }
    .card-rating {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.78rem; font-weight: 700; color: var(--text);
    }
    .card-rating svg { width:13px; height:13px; fill: var(--orange); color: var(--orange); }

    .card-title {
      font-size: 0.95rem; font-weight: 800;
      color: var(--text);
      margin-bottom: 9px;
      line-height: 1.3;
    }

    .card-detail {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--muted);
      margin-bottom: 4px;
    }
    .card-detail svg { width:13px; height:13px; flex-shrink:0; color: var(--muted); }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
    }
    .card-price {
      font-size: 1.05rem; font-weight: 800; color: var(--orange);
    }
    .card-attendees {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; color: var(--muted); font-weight: 600;
    }
    .card-attendees svg { width:14px; height:14px; }

    /* ─── RESPONSIVE ──────────────────────────── */
    @media (max-width: 1100px) { .events-grid { grid-template-columns: repeat(3,1fr); } }
    @media (max-width: 800px)  { .events-grid { grid-template-columns: repeat(2,1fr); } .stats { gap: 40px; } }
    @media (max-width: 520px)  { .events-grid { grid-template-columns: 1fr; } nav { padding: 10px 16px; } .filter-section, .events-section { padding-left: 16px; padding-right: 16px; } }
  </style>
</head>
<body>

<!-- ─── NAV ─────────────────────────────────────── -->
<nav>
  <div class="logo">
    <span>Planning</span>
    <span>Center</span>
  </div>
  <div class="nav-btns">
    <a href="homepage.html" class="btn-nav active home-link">Home</a>
    <a href="home_page_specific.html" class="btn-nav outline dashboard">Dashboard</a>
    <a href="home_page_login.html" class="btn-nav outline logout">Logout</a>
  </div>
</nav>

<!-- ─── HERO ─────────────────────────────────────── -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <h1>Discover Amazing Events</h1>
    <p>Join thousands of attendees at conferences, workshops, and networking events</p>
    <div class="search-wrap">
      <input type="text" placeholder="Search events…" id="searchInput" />
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>
</section>

<!-- ─── STATS ─────────────────────────────────────── -->
<section class="stats">
  <div class="stat">
    <div class="stat-icon">
      <!-- calendar-check icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" fill="none" stroke="#F5A623" stroke-width="1.8"/>
        <path d="M16 2v4M8 2v4M3 10h18" fill="none" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 16l2 2 4-4" fill="none" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="stat-num">150+</div>
    <div class="stat-label">Upcoming Events</div>
  </div>
  <div class="stat">
    <div class="stat-icon">
      <!-- users icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div class="stat-num">50K+</div>
    <div class="stat-label">Total Attendees</div>
  </div>
  <div class="stat">
    <div class="stat-icon">
      <!-- satisfaction / person-chart icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="6" r="3"/>
        <path d="M9 12h6M9 16h6M12 9v10"/>
        <path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke-dasharray="2 2"/>
      </svg>
    </div>
    <div class="stat-num">90%</div>
    <div class="stat-label">Satisfaction Rate</div>
  </div>
</section>

<!-- ─── FILTER ────────────────────────────────────── -->
<section class="filter-section">
  <div class="filter-header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>
    <span>Filter by Category</span>
  </div>
  <div class="filter-pills" id="filterPills">
    <button class="pill active" data-cat="All">All</button>
    <button class="pill" data-cat="Technology">Technology</button>
    <button class="pill" data-cat="Sports">Sports</button>
    <button class="pill" data-cat="Education">Education</button>
    <button class="pill" data-cat="Workshop">Workshop</button>
    <button class="pill" data-cat="Business">Business</button>
  </div>
</section>

<!-- ─── EVENTS ────────────────────────────────────── -->
<section class="events-section">
  <div class="events-grid" id="eventsGrid"></div>
</section>

<script>
  const events = [
    { cat:"Technology",   status:"available", title:"Tech Innovation Summit 2026",  date:"April 30, 2025",    loc:"Prey Veng Province",      price:"$250",  attendees:"1000 attending",  img:"https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Pre-Event Planning",            date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=600&q=70" },
    { cat:"Business",     status:"available", title:"Business Leadership Conference",date:"March 20, 2026",    loc:"Preah Sihanouk Province",  price:"$450",  attendees:"2500 attending",  img:"https://images.unsplash.com/photo-1591115765373-5207764f72e7?w=600&q=70" },
    { cat:"Entertainment",status:"available", title:"Music Festival 2026",           date:"March 20, 2026",    loc:"Phnom Penh, Koh Pech",     price:"$100",  attendees:"5230 attending",  img:"https://images.unsplash.com/photo-1501386761578-eaa54b4e3f50?w=600&q=70" },
    { cat:"Education",    status:"full",      title:"Digital Marketing Workshop",    date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=600&q=70" },
    { cat:"Workshop",     status:"full",      title:"Networking & Innovation Forum", date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Pre-Event Planning",            date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1478147427282-58a87a433b95?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Annual Healthcare Conference",  date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Sport Event",                   date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1461896836934-ffe607ba8211?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Annual General Meeting",        date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1559223607-a43c990c692c?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Fundraiser on Eventbrite",      date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1475721027785-f74eccf877e2?w=600&q=70" },
    { cat:"Workshop",     status:"available", title:"Pre-Event Planning",            date:"March 20, 2026",    loc:"Phnom Penh, RUPP",         price:"$300",  attendees:"1250 attending",  img:"https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=600&q=70" },
  ];

  const queryParams = new URLSearchParams(window.location.search);
  const userRole = queryParams.get('role') || '';
  const homeLink = document.querySelector('.btn-nav.home-link');
  const dashboardLink = document.querySelector('.btn-nav.dashboard');
  if (homeLink) {
    homeLink.href = `homepage.html${userRole ? `?role=${encodeURIComponent(userRole)}` : ''}`;
  }
  if (dashboardLink) {
    if (userRole === 'admin') {
      dashboardLink.href = 'dashboard/admin_dashboard.html';
    } else if (userRole === 'administrator') {
      dashboardLink.href = 'dashboard/syst_admin_dashboard.html';
    } else if (userRole === 'organizer') {
      dashboardLink.href = 'organizer_home.html';
    } else if (userRole === 'attendee') {
      dashboardLink.href = 'attendee_home.html';
    } else {
      dashboardLink.href = 'home_page_specific.html';
    }
  }

  const starSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const calSVG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
  const pinSVG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
  const pplSVG  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;

  function renderCards(filter, search = '') {
    const grid = document.getElementById('eventsGrid');
    const filtered = events.filter(e => {
      const catOk = filter === 'All' || e.cat === filter;
      const srchOk = e.title.toLowerCase().includes(search.toLowerCase());
      return catOk && srchOk;
    });

    grid.innerHTML = filtered.map(e => `
      <div class="card">
        <div class="card-img">
          <img src="${e.img}" alt="${e.title}" loading="lazy" />
          <span class="badge ${e.status}">${e.status === 'available' ? 'Available' : 'Full'}</span>
        </div>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-cat">${e.cat}</span>
            <span class="card-rating">${starSVG} 4.0</span>
          </div>
          <div class="card-title">${e.title}</div>
          <div class="card-detail">${calSVG} ${e.date}</div>
          <div class="card-detail">${pinSVG} ${e.loc}</div>
          <div class="card-footer">
            <span class="card-price">${e.price}</span>
            <span class="card-attendees">${pplSVG} ${e.attendees}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  let activeFilter = 'All';

  document.getElementById('filterPills').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.cat;
    renderCards(activeFilter, document.getElementById('searchInput').value);
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    renderCards(activeFilter, e.target.value);
  });

  renderCards('All');
</script>
</body>
</html>
