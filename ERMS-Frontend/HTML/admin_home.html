<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center – Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:       #F5A623;
      --orange-hover: #e09415;
      --orange-bg:    #FDEBD0;
      --text-dark:    #1a1a1a;
      --text-mid:     #555;
      --text-light:   #888;
      --border:       #e0e0e0;
      --white:        #ffffff;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* ── NAVBAR ── */
    nav {
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 1.75rem;
      line-height: 1.1;
      color: var(--orange);
      cursor: pointer;
    }

    .nav-actions { display: flex; gap: 10px; }

    .btn-nav {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 7px 20px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid var(--orange);
      background: transparent;
      color: var(--orange);
      transition: background .18s, color .18s;
    }
    .btn-nav:hover { background: var(--orange); color: #fff; }

    /* ── HERO BANNER ── */
    .hero {
      background: var(--orange-bg);
      padding: 22px 32px 20px;
    }
    .hero h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 4px;
    }
    .hero p {
      font-size: 0.9rem;
      color: var(--text-mid);
    }

    /* ── PAGE BODY ── */
    .page-body {
      display: flex;
      justify-content: center;
      padding: 36px 16px 48px;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      padding: 36px 40px 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      text-align: center;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 16px;
    }

    .card p {
      font-size: 0.9rem;
      color: var(--text-mid);
      margin-bottom: 24px;
    }

    .btn-back {
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid var(--orange);
      background: transparent;
      color: var(--orange);
      transition: background .18s, color .18s;
    }
    .btn-back:hover { background: var(--orange); color: #fff; }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <div class="logo">
    <div>Planning</div>
    <div>Center</div>
  </div>
  <div class="nav-actions">
    <button class="btn-nav" onclick="window.location.href='home_page_specific.html'">Sign In</button>
    <button class="btn-nav" onclick="window.location.href='home_page_login.html'">Sign Up</button>
  </div>
</nav>

<!-- ── HERO BANNER ── -->
<div class="hero">
  <h1>Welcome to Your Admin Dashboard</h1>
  <p>Oversee and manage the entire system.</p>
</div>

<!-- ── PAGE BODY ── -->
<div class="page-body">
  <div class="card">
    <h2>Hello, Admin!</h2>
    <p>This dashboard provides tools to manage users, events, and system settings.</p>
    <button class="btn-back" onclick="window.location.href='dashboard/admin_dashboard.html'">Open Admin Dashboard</button>
    <button class="btn-back" style="margin-top:12px;" onclick="window.location.href='home_page_specific.html'">Back to Sign In</button>
  </div>
</div>

</body>
</html>
