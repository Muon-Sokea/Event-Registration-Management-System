<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Center — Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../CSS/1_global.css" />
  <link rel="stylesheet" href="../CSS/2_navbar.css" />
  <link rel="stylesheet" href="../CSS/5_auth.css" />
</head>
<body>

  <!-- Navbar — No Dashboard on login page -->
  <nav class="navbar">
    <a class="nav-logo" href="../HTML/2_login.html">
      <span class="logo-top">Planning</span>
      <span class="logo-bottom">Center</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <button class="btn btn-outline"
        onclick="location.href='../HTML/2_login.html'">
        <i class="ri-home-line"></i> Home
      </button>
      <button class="btn btn-primary">
        <i class="ri-login-box-line"></i> Sign in
      </button>
      <button class="btn btn-outline"
        onclick="location.href='../HTML/3_register.html'">
        <i class="ri-user-add-line"></i> Sign up
      </button>
    </div>
  </nav>

  <!-- Orange Banner -->
  <div class="auth-hero">
    <h2>Discover and Manage Events</h2>
    <p>Register, Organize, review, and track your event participation.</p>
  </div>

  <!-- Login Card -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo-center">
        <div class="auth-logo-badge">
          <span class="logo-top">Planning</span>
          <span class="logo-bottom">Center</span>
        </div>
      </div>

      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your Planning Center account</p>

      <div class="alert alert-error"   id="authError"   style="display:none"></div>
      <div class="alert alert-success" id="authSuccess" style="display:none"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address
            <span style="color:var(--danger)">*</span>
          </label>
          <div class="input-with-icon">
            <i class="ri-mail-line input-icon-left"></i>
            <input type="email" id="loginEmail"
              placeholder="Enter your email" required />
          </div>
        </div>

        <div class="form-group">
          <label>Password
            <span style="color:var(--danger)">*</span>
          </label>
          <div class="input-with-icon">
            <i class="ri-lock-line input-icon-left"></i>
            <input type="password" id="loginPassword"
              class="has-toggle"
              placeholder="Enter your password" required />
            <button type="button" class="toggle-password"
              onclick="togglePassword('loginPassword','eye1')">
              <i class="ri-eye-line" id="eye1"></i>
            </button>
          </div>
        </div>

        <div class="auth-row">
          <label class="remember-label">
            <input type="checkbox" id="rememberMe" />
            Remember me
          </label>
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-full"
          style="margin-top:8px">
          <i class="ri-login-box-line"></i> Login
        </button>
      </form>

      <!-- Divider -->
      <div class="social-divider">
        <span>or continue with</span>
      </div>

      <!-- Social Login Buttons -->
      <div class="social-btns">
        <button class="social-btn" onclick="loginWithGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Google
        </button>

        <button class="social-btn" onclick="loginWithFacebook()">
          <i class="ri-facebook-fill"
            style="font-size:20px;color:#1877F2"></i>
          Facebook
        </button>

        <button class="social-btn" onclick="loginWithApple()">
          <i class="ri-apple-fill"
            style="font-size:20px;color:#000000"></i>
          Apple
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account?
        <a href="../HTML/3_register.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="../JS/1_navbar.js"></script>
  <script src="../JS/3_auth.js"></script>
  <script>
    // If already logged in, go to home
    document.addEventListener("DOMContentLoaded", () => {
      const user = localStorage.getItem("erms_user");
      if (user) window.location.href = "../HTML/1_index.html";
    });

    function loginWithGoogle() {
      alert("Google login coming soon!\n\nThis will connect to Google OAuth API in production.");
    }
    function loginWithFacebook() {
      alert("Facebook login coming soon!\n\nThis will connect to Facebook OAuth API in production.");
    }
    function loginWithApple() {
      alert("Apple login coming soon!\n\nThis will connect to Apple OAuth API in production.");
    }
  </script>
</body>
</html>
