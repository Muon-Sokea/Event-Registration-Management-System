<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Center — My Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../CSS/1_global.css" />
  <link rel="stylesheet" href="../CSS/2_navbar.css" />
  <link rel="stylesheet" href="../CSS/6_dashboard.css" />
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="../HTML/1_index.html">
      <span class="logo-top">Planning</span>
      <span class="logo-bottom">Center</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <button class="btn btn-outline"
        onclick="location.href='../HTML/1_index.html'">
        <i class="ri-home-line"></i> Home
      </button>
      <button class="btn btn-primary">
        <i class="ri-dashboard-line"></i> Dashboard
      </button>
      <button class="btn btn-outline" onclick="logout()">
        <i class="ri-logout-box-r-line"></i> Logout
      </button>
    </div>
  </nav>

  <div class="dashboard-page">
    <div class="dashboard-header">
      <div>
        <h1>My Dashboard</h1>
        <p>Manage your event registrations and tickets</p>
      </div>
      <button class="btn btn-outline">
        <i class="ri-settings-3-line"></i> Profile Settings
      </button>
    </div>

    <div class="dashboard-body">
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-card-info">
            <div class="label">Total Events</div>
            <div class="value" id="statTotalEvents">0</div>
          </div>
          <div class="stat-card-icon">
            <i class="ri-file-list-3-line"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-info">
            <div class="label">Upcoming Events</div>
            <div class="value" id="statUpcoming">0</div>
          </div>
          <div class="stat-card-icon">
            <i class="ri-checkbox-circle-line"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-info">
            <div class="label">Total Spent</div>
            <div class="value" id="statTotalSpent">$0</div>
          </div>
          <div class="stat-card-icon">
            <i class="ri-download-line"></i>
          </div>
        </div>
      </div>

      <div class="tab-filter">
        <button class="tab-filter-btn active"
          onclick="switchEventTab('upcoming', this)">
          Upcoming Events (2)
        </button>
        <button class="tab-filter-btn"
          onclick="switchEventTab('past', this)">
          Past Events (0)
        </button>
      </div>

      <div id="myEventsGrid"></div>
    </div>
  </div>

  <script src="../JS/1_navbar.js"></script>
  <script src="../JS/4_dashboard.js"></script>
  <script>
    function switchEventTab(filter, btn) {
      document.querySelectorAll(".tab-filter-btn")
        .forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      renderMyEvents(filter);
    }
    requireAuth();
    requireRole(["Attendee"]);
  </script>
</body>
</html>
