<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center — Sign In</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">📅</div>
        <div class="auth-logo-text">
          <span class="top">Planning</span>
          <span class="bottom">Center</span>
        </div>
      </div>

      <!-- Title -->
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your Planning Center account</p>

      <!-- Error / Success -->
      <div class="alert alert-error" id="authError"
        style="display:none"></div>
      <div class="alert alert-success" id="authSuccess"
        style="display:none"></div>

      <!-- Role Selector -->
      <div class="form-group">
        <label>Select Your Role</label>
        <div class="role-pills">
          <button class="role-pill active" data-role="Attendee"
            onclick="selectRole('Attendee')">Attendee</button>
          <button class="role-pill" data-role="Organizer"
            onclick="selectRole('Organizer')">Organizer</button>
          <button class="role-pill" data-role="Admin"
            onclick="selectRole('Admin')">Admin</button>
          <button class="role-pill" data-role="Supervisor"
            onclick="selectRole('Supervisor')">Administrator</button>
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm">

        <!-- Email -->
        <div class="form-group">
          <label for="loginEmail">Email Address <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>✉️</i>
            <input type="email" id="loginEmail"
              placeholder="Enter your email" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="loginPassword">Password <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>🔒</i>
            <input type="password" id="loginPassword"
              class="has-toggle"
              placeholder="Enter your password" required />
            <button type="button" class="toggle-password"
              onclick="togglePassword('loginPassword', 'eyeIcon1')">
              <span id="eyeIcon1">👁️</span>
            </button>
          </div>
        </div>

        <!-- Remember me + Forgot -->
        <div style="display:flex;align-items:center;
          justify-content:space-between;margin-bottom:16px">
          <label style="display:flex;align-items:center;
            gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="rememberMe" />
            Remember me
          </label>
          <div class="forgot-link">
            <a href="#">Forgot password?</a>
          </div>
        </div>

        <!-- Info box -->
        <div style="background:var(--bg-light);border:1px solid
          var(--border);border-radius:var(--border-radius);
          padding:10px 14px;font-size:13px;color:var(--text-medium);
          margin-bottom:16px;line-height:1.6">
          Select your role above to access the corresponding dashboard.
          Failed login attempts will trigger error messages.
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-full">
          Login
        </button>

      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account?
        <a href="register.html">Sign Up</a>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
