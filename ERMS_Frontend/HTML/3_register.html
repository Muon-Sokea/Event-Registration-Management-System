<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center — Create Account</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">📅</div>
        <div class="auth-logo-text">
          <span class="top">Planning</span>
          <span class="bottom">Center</span>
        </div>
      </div>

      <!-- Title -->
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Fill in your details to get started</p>

      <!-- Error / Success -->
      <div class="alert alert-error" id="authError"
        style="display:none"></div>
      <div class="alert alert-success" id="authSuccess"
        style="display:none"></div>

      <!-- Register Form -->
      <form id="registerForm">

        <!-- Name Row -->
        <div class="name-row">
          <div class="form-group">
            <label for="regFirstName">First Name <span style="color:var(--danger)">*</span></label>
            <div class="input-with-icon">
              <i>👤</i>
              <input type="text" id="regFirstName"
                placeholder="Enter your first name" required />
            </div>
          </div>
          <div class="form-group">
            <label for="regLastName">Last Name <span style="color:var(--danger)">*</span></label>
            <div class="input-with-icon">
              <i>👤</i>
              <input type="text" id="regLastName"
                placeholder="Enter your last name" required />
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="regEmail">Email Address <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>✉️</i>
            <input type="email" id="regEmail"
              placeholder="Enter your email" required />
          </div>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="regPhone">Phone Number <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>📞</i>
            <input type="tel" id="regPhone"
              placeholder="Enter your phone number" required />
          </div>
        </div>

        <!-- Address -->
        <div class="form-group">
          <label for="regAddress">Address <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>📍</i>
            <input type="text" id="regAddress"
              placeholder="Enter your address" required />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="regPassword">Password <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>🔒</i>
            <input type="password" id="regPassword"
              class="has-toggle"
              placeholder="Min. 8 characters" required />
            <button type="button" class="toggle-password"
              onclick="togglePassword('regPassword','eyeIcon2')">
              <span id="eyeIcon2">👁️</span>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="regConfirmPassword">Confirm Password <span style="color:var(--danger)">*</span></label>
          <div class="input-with-icon">
            <i>🔒</i>
            <input type="password" id="regConfirmPassword"
              class="has-toggle"
              placeholder="Re-enter your password" required />
            <button type="button" class="toggle-password"
              onclick="togglePassword('regConfirmPassword','eyeIcon3')">
              <span id="eyeIcon3">👁️</span>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-full">
          Create Account
        </button>

      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Already have an account?
        <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
