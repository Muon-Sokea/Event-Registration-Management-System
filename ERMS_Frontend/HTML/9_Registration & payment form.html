<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center — Event Registration</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/navbar.css" />
  <style>
    .register-page  { max-width: 720px; margin: 0 auto; padding: 32px 24px; }
    .register-title { text-align: center; margin-bottom: 8px; }
    .register-sub   {
      text-align: center;
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .form-section {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-lg);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .form-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }
    .order-summary {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--border-radius-lg);
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 6px 0;
      color: var(--text-medium);
    }
    .order-total {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 700;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      color: var(--text-dark);
    }
    .order-total span:last-child { color: var(--primary); }
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: space-between;
    }
    @media (max-width: 600px) {
      .form-row { flex-direction: column; gap: 0; }
      .form-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar">
    <a class="nav-logo" href="../index.html">
      <span class="logo-top">Planning</span>
      <span class="logo-bottom">Center</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <button class="btn btn-outline"
        onclick="location.href='../index.html'">Home</button>
      <button class="btn btn-outline"
        onclick="goToDashboard()">Dashboard</button>
      <button class="btn btn-outline" onclick="logout()">🚪 Logout</button>
    </div>
  </nav>

  <main class="register-page">

    <h1 class="register-title">Event Registration</h1>
    <p class="register-sub" id="registerSubtitle">
      Complete your registration for the event
    </p>

    <!-- Error -->
    <div class="alert alert-error" id="regError" style="display:none"></div>

    <form id="eventRegForm">

      <!-- Personal Information -->
      <div class="form-section">
        <div class="form-section-title">👤 Personal Information</div>

        <div class="form-row">
          <div class="form-group">
            <label>First Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pFirstName" placeholder="Enter your first name" required />
          </div>
          <div class="form-group">
            <label>Last Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pLastName" placeholder="Enter your last name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email <span style="color:var(--danger)">*</span></label>
            <input type="email" id="pEmail" placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label>Phone Number <span style="color:var(--danger)">*</span></label>
            <input type="tel" id="pPhone" placeholder="Enter your phone number" required />
          </div>
        </div>

        <div class="form-group">
          <label>Address <span style="color:var(--danger)">*</span></label>
          <input type="text" id="pAddress" placeholder="Enter your address" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>City <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pCity" placeholder="Enter your city" required />
          </div>
          <div class="form-group">
            <label>ZIP Code <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pZip" placeholder="Enter your ZIP code" />
          </div>
        </div>
      </div>

      <!-- Payment Information -->
      <div class="form-section">
        <div class="form-section-title">💳 Payment Information</div>

        <div class="form-group">
          <label>Cardholder Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="cardName"
            placeholder="Enter your cardholder name" required />
        </div>

        <div class="form-group">
          <label>Card Number <span style="color:var(--danger)">*</span></label>
          <input type="text" id="cardNumber"
            placeholder="Enter your card number"
            maxlength="19"
            oninput="formatCardNumber(this)" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Expiry Date <span style="color:var(--danger)">*</span></label>
            <input type="text" id="cardExpiry"
              placeholder="MM/YY" maxlength="5"
              oninput="formatExpiry(this)" required />
          </div>
          <div class="form-group">
            <label>CVV <span style="color:var(--danger)">*</span></label>
            <input type="text" id="cardCVV"
              placeholder="CVV" maxlength="3" required />
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <div class="form-section-title" style="margin-bottom:12px">
          📋 Order Summary
        </div>
        <div class="order-row">
          <span>Event Ticket</span>
          <span style="color:var(--primary)">$<span id="summaryPrice">250</span></span>
        </div>
        <div class="order-row">
          <span>Processing Fee</span>
          <span style="color:var(--primary)">$5</span>
        </div>
        <div class="order-total">
          <span>Total:</span>
          <span>$<span id="summaryTotal">255</span></span>
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn btn-outline"
          onclick="history.back()">Cancel</button>
        <button type="submit" class="btn btn-primary"
          style="flex:1;max-width:320px">
          Complete Registration & Payment
        </button>
      </div>

    </form>

  </main>

  <script src="../js/navbar.js"></script>
  <script src="../js/events.js"></script>
  <script>
    // Format card number with spaces
    function formatCardNumber(input) {
      let v = input.value.replace(/\D/g, "").substring(0, 16);
      input.value = v.replace(/(.{4})/g, "$1 ").trim();
    }

    // Format expiry MM/YY
    function formatExpiry(input) {
      let v = input.value.replace(/\D/g, "").substring(0, 4);
      if (v.length >= 2) v = v.substring(0, 2) + "/" + v.substring(2);
      input.value = v;
    }

    // Pre-fill user info and event data
    document.addEventListener("DOMContentLoaded", () => {
      // Load user
      const user = getCurrentUser ? getCurrentUser() : null;
      if (user) {
        document.getElementById("pFirstName").value = user.firstName || "";
        document.getElementById("pLastName").value  = user.lastName  || "";
        document.getElementById("pEmail").value     = user.email     || "";
      }

      // Load event
      const event = loadEventFromStorage();
      if (event) {
        document.getElementById("registerSubtitle").textContent =
          `Complete your registration for ${event.title}`;
        document.getElementById("summaryPrice").textContent = event.price;
        document.getElementById("summaryTotal").textContent = event.price + 5;
      }
    });

    // Handle form submission
    document.getElementById("eventRegForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const errEl = document.getElementById("regError");
      errEl.style.display = "none";

      const firstName = document.getElementById("pFirstName").value.trim();
      const lastName  = document.getElementById("pLastName").value.trim();
      const email     = document.getElementById("pEmail").value.trim();
      const phone     = document.getElementById("pPhone").value.trim();
      const cardName  = document.getElementById("cardName").value.trim();
      const cardNum   = document.getElementById("cardNumber").value.trim();
      const expiry    = document.getElementById("cardExpiry").value.trim();
      const cvv       = document.getElementById("cardCVV").value.trim();

      if (!firstName || !lastName || !email || !phone ||
          !cardName  || !cardNum  || !expiry || !cvv) {
        errEl.textContent    = "Please fill in all required fields.";
        errEl.style.display  = "block";
        return;
      }

      // TODO: connect to payment API
      // Mark as coming from payment
      localStorage.setItem("erms_from_payment", "true");
      localStorage.setItem("erms_ticket_id",    "TKT-001-2026");

      // Redirect to ticket page
      window.location.href = "ticket.html";
    });
  </script>
</body>
</html>
