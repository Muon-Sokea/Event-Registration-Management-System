<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning Center — Event Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../CSS/1_global.css" />
  <link rel="stylesheet" href="../CSS/2_navbar.css" />
  <style>
    .reg-page{max-width:720px;margin:0 auto;padding:32px 24px}
    .reg-title{text-align:center;margin-bottom:4px}
    .reg-sub{text-align:center;color:var(--text-light);font-size:14px;margin-bottom:28px}
    .form-section{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--border-radius-lg);padding:20px 24px;margin-bottom:16px}
    .form-section-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:var(--text-dark);margin-bottom:16px}
    .form-section-title i{font-size:18px;color:var(--primary)}
    .form-row{display:flex;gap:16px}
    .form-row .form-group{flex:1}
    .order-summary{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--border-radius-lg);padding:20px 24px;margin-bottom:24px}
    .order-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;color:var(--text-medium)}
    .order-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
    .order-total span:last-child{color:var(--primary)}
    .form-actions{display:flex;gap:12px;justify-content:space-between}
    @media(max-width:600px){.form-row{flex-direction:column;gap:0}.form-actions{flex-direction:column}}
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="../HTML/1_index.html">
      <span class="logo-top">Planning</span>
      <span class="logo-bottom">Center</span>
    </a>
    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <button class="btn btn-primary"
        onclick="location.href='../HTML/1_index.html'">
        <i class="ri-home-line"></i> Home
      </button>
      <button class="btn btn-outline" onclick="goToDashboard()">
        <i class="ri-dashboard-line"></i> Dashboard
      </button>
      <button class="btn btn-outline" onclick="logout()">
        <i class="ri-logout-box-r-line"></i> Logout
      </button>
    </div>
  </nav>

  <main class="reg-page">
    <h1 class="reg-title">Event Registration</h1>
    <p class="reg-sub" id="regSubtitle">
      Complete your registration for the event
    </p>

    <div class="alert alert-error" id="regError" style="display:none"></div>

    <form id="eventRegForm">

      <!-- Personal Information -->
      <div class="form-section">
        <div class="form-section-title">
          <i class="ri-user-3-line"></i> Personal Information
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pFirstName"
              placeholder="Enter your first name" required />
          </div>
          <div class="form-group">
            <label>Last Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pLastName"
              placeholder="Enter your last name" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email <span style="color:var(--danger)">*</span></label>
            <input type="email" id="pEmail"
              placeholder="Enter your email" required />
          </div>
          <div class="form-group">
            <label>Phone Number <span style="color:var(--danger)">*</span></label>
            <input type="tel" id="pPhone"
              placeholder="Enter your phone number" required />
          </div>
        </div>
        <div class="form-group">
          <label>Address <span style="color:var(--danger)">*</span></label>
          <input type="text" id="pAddress"
            placeholder="Enter your address" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>City <span style="color:var(--danger)">*</span></label>
            <input type="text" id="pCity"
              placeholder="Enter your city" required />
          </div>
          <div class="form-group">
            <label>ZIP Code</label>
            <input type="text" id="pZip"
              placeholder="Enter your ZIP code" />
          </div>
        </div>
      </div>

      <!-- Payment Information -->
      <div class="form-section">
        <div class="form-section-title">
          <i class="ri-bank-card-line"></i> Payment Information
        </div>
        <div class="form-group">
          <label>Cardholder Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="cardName"
            placeholder="Enter your cardholder name" required />
        </div>
        <div class="form-group">
          <label>Card Number <span style="color:var(--danger)">*</span></label>
          <input type="text" id="cardNumber"
            placeholder="Enter your card number"
            maxlength="19"
            oninput="formatCard(this)" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Expiry Date <span style="color:var(--danger)">*</span></label>
            <input type="text" id="cardExpiry"
              placeholder="MM/YY" maxlength="5"
              oninput="formatExpiry(this)" required />
          </div>
          <div class="form-group">
            <label>CVV <span style="color:var(--danger)">*</span></label>
            <input type="text" id="cardCVV"
              placeholder="CVV" maxlength="3" required />
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <div class="form-section-title" style="margin-bottom:12px">
          <i class="ri-file-list-3-line"></i> Order Summary
        </div>
        <div class="order-row">
          <span>Event Ticket</span>
          <span style="color:var(--primary)">
            $<span id="summaryPrice">250</span>
          </span>
        </div>
        <div class="order-row">
          <span>Processing Fee</span>
          <span style="color:var(--primary)">$5</span>
        </div>
        <div class="order-total">
          <span>Total:</span>
          <span>$<span id="summaryTotal">255</span></span>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline"
          onclick="history.back()">Cancel</button>
        <button type="submit" class="btn btn-primary"
          style="flex:1;max-width:380px">
          Complete Registration & Payment
        </button>
      </div>
    </form>
  </main>

  <script src="../JS/1_navbar.js"></script>
  <script src="../JS/2_events.js"></script>
  <script>
    function formatCard(input) {
      let v = input.value.replace(/\D/g,"").substring(0,16);
      input.value = v.replace(/(.{4})/g,"$1 ").trim();
    }
    function formatExpiry(input) {
      let v = input.value.replace(/\D/g,"").substring(0,4);
      if (v.length >= 2) v = v.substring(0,2) + "/" + v.substring(2);
      input.value = v;
    }
    document.addEventListener("DOMContentLoaded", () => {
      const user = getCurrentUser ? getCurrentUser() : null;
      if (user) {
        document.getElementById("pFirstName").value = user.firstName || "";
        document.getElementById("pLastName").value  = user.lastName  || "";
        document.getElementById("pEmail").value     = user.email     || "";
      }
      const event = loadEventFromStorage();
      if (event) {
        document.getElementById("regSubtitle").textContent =
          "Complete your registration for " + event.title;
        document.getElementById("summaryPrice").textContent = event.price;
        document.getElementById("summaryTotal").textContent = event.price + 5;
      }
    });
    document.getElementById("eventRegForm")
      .addEventListener("submit", (e) => {
        e.preventDefault();
        const err = document.getElementById("regError");
        err.style.display = "none";
        const fields = [
          "pFirstName","pLastName","pEmail","pPhone",
          "pAddress","pCity","cardName","cardNumber",
          "cardExpiry","cardCVV"
        ];
        const empty = fields.some(
          (id) => !document.getElementById(id).value.trim()
        );
        if (empty) {
          err.textContent   = "Please fill in all required fields.";
          err.style.display = "block";
          return;
        }
        localStorage.setItem("erms_from_payment", "true");
        localStorage.setItem("erms_ticket_id",    "TKT-001-2026");
        window.location.href = "../HTML/10_ticket.html";
      });
  </script>
</body>
</html>
